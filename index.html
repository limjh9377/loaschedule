function generateDefaultTimeSlots() {
  const slots = [];
  let h = 10, m = 30;
  while (true) {
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    m += 30;
    if (m >= 60) { m = 0; h++; }
    if (h >= 24) h = 0;
    if (h === 2 && m === 30) break;
    if (slots.length > 100) break;
  }
  return slots;
}

    isSupabaseConnected = false;
    return false;
  }
}

function uid() {
  return 'local-' + Math.random().toString(36).slice(2) + '-' + Date.now();
}

function normalizeTime(t) {
  if (!t) return '';
  return String(t).substring(0, 5);
}

function formatTime(t) {
  if (!t) return '';
  const raw = normalizeTime(t);
  const [hh, mm] = raw.split(':');
  let h = parseInt(hh, 10);
  const period = h < 12 ? 'AM' : 'PM';
  if (h === 0) h = 12;
  else if (h > 12) h -= 12;
  return `${h}:${mm} ${period}`;
}

function timeToMinutes(t) {
  const raw = normalizeTime(t);
  const [h, m] = raw.split(':').map(Number);
  return h * 60 + m;
}

function minutesToTime(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function getPlayer(id) { return state.players.find(p => p.id === id); }
function getCharacter(id) { return state.characters.find(c => c.id === id); }

  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
  t.innerHTML = `<span style="font-weight:700">${icon}</span> ${msg}`;
  tc.appendChild(t);
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.3s';
    setTimeout(() => t.remove(), 300);
  }, 3000);
}

async function dbFetch(table, query={}) {
  if (!isSupabaseConnected) return null;
  try {
    let q = supabase.from(table).select(query.select || '*');
    if (query.eq) {
      Object.entries(query.eq).forEach(([k, v]) => {
        q = q.eq(k, v);
      });
    }
    if (query.order) {
      q = q.order(query.order.col, { ascending: query.order.asc ?? true });
    }
    const { data, error } = await q;
    if (error) throw error;
    return data;
  } catch (e) {
    console.error(`DB 조회 오류 (${table})`, e);
    return null;
  }
}

async function dbInsert(table, values) {
  if (!isSupabaseConnected) return null;
  try {
    const { data, error } = await supabase.from(table).insert(values).select();
    if (error) throw error;
    return data;
  } catch (e) {
    console.error(`DB 삽입 오류 (${table})`, e);
    showToast(e.message || '저장 실패', 'error');
    return null;
  }
}

async function dbUpdate(table, match, values) {
  if (!isSupabaseConnected) return null;
  try {
    let q = supabase.from(table).update(values);
    Object.entries(match).forEach(([k,v]) => {
      q = q.eq(k, v);
    });
    const { data, error } = await q.select();
    if (error) throw error;
    return data;
  } catch (e) {
    console.error(`DB 수정 오류 (${table})`, e);
    showToast(e.message || '수정 실패', 'error');
    return null;
  }
}

async function dbDelete(table, match) {
  if (!isSupabaseConnected) return false;
  try {
    let q = supabase.from(table).delete();
    Object.entries(match).forEach(([k,v]) => {
      q = q.eq(k, v);
    });
    const { error } = await q;
    if (error) throw error;
    return true;
  } catch (e) {
    console.error(`DB 삭제 오류 (${table})`, e);
    showToast(e.message || '삭제 실패', 'error');
    return false;
  }
}

async function ensureTimeSettingsRow() {
  if (!isSupabaseConnected) return;
  try {
    const { data, error } = await supabase
      .from('schedule_settings')
      .select('setting_key')
      .eq('setting_key', 'default')
      .maybeSingle();

    if (error) throw error;

    if (!data) {
      const { error: insertError } = await supabase
        .from('schedule_settings')
        .insert({
          setting_key: 'default',
          time_slots: generateDefaultTimeSlots()
        });
      if (insertError) throw insertError;
    }
  } catch (e) {
    console.error('schedule_settings 초기화 실패', e);
  }
}

function getSortedTimeSlots() {
  return [...state.timeSlots].sort((a,b) => {
    const am = timeToMinutes(a);
    const bm = timeToMinutes(b);
    const adjA = am < 360 ? am + 1440 : am;
    const adjB = bm < 360 ? bm + 1440 : bm;
    return adjA - adjB;
  });
}

function renderScheduleGrid() {
  const tbody = document.getElementById('scheduleBody');
  const grid = document.getElementById('scheduleGrid');
  if (!tbody || !grid) return;

  if (state.timeEditMode) grid.classList.add('time-edit-active');
  else grid.classList.remove('time-edit-active');

  const days = [1,2,3,4,5,6,7];
  const sortedSlots = getSortedTimeSlots();

  const slotMap = {};
  state.scheduleSlots.forEach(slot => {
    const key = `${slot.day_of_week}_${normalizeTime(slot.start_time)}`;
    if (!slotMap[key]) slotMap[key] = [];
    slotMap[key].push(slot);
  });

  const absentCountMap = {};
  state.attendance.filter(a => a.is_absent).forEach(a => {
    absentCountMap[a.schedule_slot_id] = (absentCountMap[a.schedule_slot_id] || 0) + 1;
  });

  tbody.innerHTML = sortedSlots.map(time => {
    const cells = days.map(day => {
      const key = `${day}_${time}`;
      const slots = slotMap[key] || [];

      if (slots.length === 0) {
        return `<td><div class="schedule-cell"><span class="schedule-cell-empty" onclick="quickAddSchedule(${day},'${time}')" title="클릭하여 일정 추가">—</span></div></td>`;
      }

      const blocks = slots.map(slot => {
        const party = getParty(slot.party_id);
        const absentCount = absentCountMap[slot.id] || 0;
        return `<button class="party-block ${absentCount > 0 ? 'has-absent' : ''}" onclick="openScheduleDetail('${slot.id}')">
          ${party ? party.name : '?'}
          ${absentCount > 0 ? `<span class="absent-badge">${absentCount}</span>` : ''}
        </button>`;
      }).join('');

      return `<td><div class="schedule-cell">${blocks}</div></td>`;
    }).join('');

    return `<tr>
      <td style="height:44px">
        ${formatTime(time)}
        <div class="time-edit-btns">
          <button class="time-btn time-btn-add" onclick="addTimeSlotBefore('${time}')" title="이 시간 앞에 추가">+</button>
          <button class="time-btn time-btn-del" onclick="removeTimeSlot('${time}')" title="이 행 삭제">−</button>
        </div>
      </td>
      ${cells}
    </tr>`;
  }).join('');

  if (sortedSlots.length > 0) {
    const lastTime = sortedSlots[sortedSlots.length - 1];
    const lastMins = timeToMinutes(lastTime);
    const adjLast = lastMins < 360 ? lastMins + 1440 : lastMins;
    const newTime = minutesToTime((adjLast + 30) % 1440);

    const addRow = document.createElement('tr');
    addRow.style.display = state.timeEditMode ? '' : 'none';
    addRow.innerHTML = `<td colspan="8" style="text-align:center;padding:8px;border-top:1px dashed var(--border)">
      <button onclick="addTimeSlotEnd()" class="btn btn-ghost btn-sm" style="color:var(--mint);font-size:12px">
        + 맨 아래에 시간 추가 (${formatTime(newTime)})
      </button>
    </td>`;
    tbody.appendChild(addRow);
  }
}

function addTimeSlotBefore(time) {
  const mins = timeToMinutes(time);
  const adj = mins < 360 ? mins + 1440 : mins;
  const newTime = minutesToTime((adj - 30 + 1440) % 1440);

  if (state.timeSlots.includes(newTime)) {
    showToast('이미 존재하는 시간입니다.', 'info');
    return;
  }

  const idx = state.timeSlots.indexOf(time);
  if (idx >= 0) state.timeSlots.splice(idx, 0, newTime);
  else state.timeSlots.push(newTime);

  saveTimeSettings();
  renderScheduleGrid();
}

function addTimeSlotEnd() {
  const sorted = getSortedTimeSlots();
  const last = sorted[sorted.length - 1];
  const lastMins = timeToMinutes(last);
  const adjLast = lastMins < 360 ? lastMins + 1440 : lastMins;
  const newTime = minutesToTime((adjLast + 30) % 1440);

  if (state.timeSlots.includes(newTime)) {
    showToast('이미 존재하는 시간입니다.', 'info');
    return;
  }

  state.timeSlots.push(newTime);
  saveTimeSettings();
  renderScheduleGrid();
}

async function removeTimeSlot(time) {
  const hasSchedule = state.scheduleSlots.some(s => normalizeTime(s.start_time) === time);
  if (hasSchedule) {
    if (!confirm(`${formatTime(time)}에 배치된 일정이 있습니다. 그래도 삭제하시겠습니까?`)) return;
  }
  if (state.timeSlots.length <= 2) {
    showToast('최소 2개 이상의 시간 슬롯이 필요합니다.', 'error');
    return;
  }

  state.timeSlots = state.timeSlots.filter(t => t !== time);
  await saveTimeSettings();
  renderScheduleGrid();
}

async function saveSchedule() {
  const partyId = document.getElementById('schedParty').value;
  const day = parseInt(document.getElementById('schedDay').value, 10);
  const startTime = document.getElementById('schedStart').value;
  const endTime = document.getElementById('schedEnd').value;

  if (!partyId) {
    document.getElementById('schedPartyError').textContent = '파티를 선택해주세요.';
    return;
  }
  if (!startTime || !endTime) {
    showToast('시작 시간과 종료 시간을 입력해주세요.', 'error');
    return;
  }
  if (startTime === endTime) {
    showToast('종료 시간은 시작 시간과 같을 수 없습니다.', 'error');
    return;
  }

  const values = {
    party_id: partyId,
    day_of_week: day,
    start_time: startTime + ':00',
    end_time: endTime + ':00'
  };

  if (state.editingScheduleId) {
    if (isSupabaseConnected) {
      const d = await dbUpdate('schedule_slots', { id: state.editingScheduleId }, values);
      if (!d) return;
      if (!state.timeSlots.includes(startTime)) {
        state.timeSlots.push(startTime);
        await saveTimeSettings();
      }
      closeModal('scheduleModal');
      await reloadAndRender();
      showToast('일정이 수정되었습니다.');
      return;
    }

    const idx = state.scheduleSlots.findIndex(s => s.id === state.editingScheduleId);
    if (idx >= 0) state.scheduleSlots[idx] = { ...state.scheduleSlots[idx], ...values };
    showToast('일정이 수정되었습니다.');
  } else {
    if (isSupabaseConnected) {
      const d = await dbInsert('schedule_slots', values);
      if (!d) return;
      if (!state.timeSlots.includes(startTime)) {
        state.timeSlots.push(startTime);
        await saveTimeSettings();
      }
      closeModal('scheduleModal');
      await reloadAndRender();
      showToast('일정이 추가되었습니다.');
      return;
    }

    state.scheduleSlots.push({ id: uid(), ...values });
    showToast('일정이 추가되었습니다.');
  }

  if (!state.timeSlots.includes(startTime)) {
    state.timeSlots.push(startTime);
    saveTimeSettings();
  }

  closeModal('scheduleModal');
  renderScheduleGrid();
}

async function toggleAbsent(slotId, pmId) {

  if (isSupabaseConnected) {
    if (existing) {
      const d = await dbUpdate('attendance', { id: existing.id }, { is_absent: newAbsent });
      if (!d) return;
    } else {
      const d = await dbInsert('attendance', { schedule_slot_id: slotId, party_member_id: pmId, is_absent: true });

  else state.attendance.push({ id: uid(), schedule_slot_id: slotId, party_member_id: pmId, is_absent: true });

  renderScheduleGrid();
  openScheduleDetail(slotId);

function buildCharacterOptions(selectedCharId, currentSlotTempId) {
  const usedCharIds = new Set(
    state.editingPartyMemberSlots
      .filter(s => s.tempId !== currentSlotTempId && s.charId)
      .map(s => s.charId)
  );

  const usedPlayerIds = new Set();
  state.editingPartyMemberSlots.forEach(s => {
    if (s.tempId === currentSlotTempId || !s.charId) return;
    const c = getCharacter(s.charId);
    if (c) usedPlayerIds.add(c.player_id);
  });

  return state.players.map(player => {
    const chars = state.characters.filter(c => c.player_id === player.id);
    if (chars.length === 0) return '';
    const options = chars.map(c => {
      const selected = c.id === selectedCharId ? 'selected' : '';
      const disabled = usedCharIds.has(c.id) ? 'disabled' : '';
      return `<option value="${c.id}" ${selected} ${disabled}>[${player.name}] ${c.name} Lv.${c.level}${c.role ? ' (' + c.role + ')' : ''}</option>`;
    }).join('');
    return `<optgroup label="${player.name}${usedPlayerIds.has(player.id) ? ' ⚠️이미 배치됨' : ''}">${options}</optgroup>`;
  }).join('');
}

function updateMemberSlot(tempId, charId) {
  const slot = state.editingPartyMemberSlots.find(s => s.tempId === tempId);
  if (!slot) return;

  if (charId) {
    const char = getCharacter(charId);
    const isDupPlayer = state.editingPartyMemberSlots.some(s => {
      if (s.tempId === tempId || !s.charId) return false;
      const sc = getCharacter(s.charId);
      return sc && char && sc.player_id === char.player_id;
    });
    if (isDupPlayer) {
      showToast('동일 플레이어의 캐릭터는 한 파티에 1개만 배치 가능합니다.', 'error');
      return;
    }
  }

  slot.charId = charId;
  renderMemberSlots();
}

async function saveParty() {
  const name = document.getElementById('partyName').value.trim();
  const raidId = document.getElementById('partyRaid').value || null;
  const filledSlots = state.editingPartyMemberSlots.filter(s => s.charId);

  if (!name) {
    document.getElementById('partyNameError').textContent = '파티명을 입력해주세요.';
    return;
  }
  document.getElementById('partyNameError').textContent = '';

  const values = { name, raid_id: raidId, max_members: 4 };

  if (state.editingPartyId) {
    if (isSupabaseConnected) {
      const d = await dbUpdate('parties', { id: state.editingPartyId }, values);
      if (!d) return;
      const delOk = await dbDelete('party_members', { party_id: state.editingPartyId });
      if (!delOk) return;

      for (let i = 0; i < filledSlots.length; i++) {
        const md = await dbInsert('party_members', {
          party_id: state.editingPartyId,
          character_id: filledSlots[i].charId,
          slot_order: i + 1
        });
        if (!md) return;
      }

      closeModal('partyModal');
      await reloadAndRender();
      showToast('파티가 수정되었습니다.');
      return;
    }

    const idx = state.parties.findIndex(p => p.id === state.editingPartyId);
    if (idx >= 0) state.parties[idx] = { ...state.parties[idx], ...values };
    state.partyMembers = state.partyMembers.filter(m => m.party_id !== state.editingPartyId);
    filledSlots.forEach((s, i) => {
      state.partyMembers.push({ id: uid(), party_id: state.editingPartyId, character_id: s.charId, slot_order: i + 1 });
    });
    showToast('파티가 수정되었습니다.');
  } else {
    if (isSupabaseConnected) {
      const d = await dbInsert('parties', values);
      if (!d) return;
      const partyId = d[0].id;

      for (let i = 0; i < filledSlots.length; i++) {
        const md = await dbInsert('party_members', {
          party_id: partyId,
          character_id: filledSlots[i].charId,
          slot_order: i + 1
        });
        if (!md) return;
      }

      closeModal('partyModal');
      await reloadAndRender();
      showToast('파티가 생성되었습니다.');
      return;
    }

    const partyId = uid();
    state.parties.push({ id: partyId, ...values });
    filledSlots.forEach((s, i) => {
      state.partyMembers.push({ id: uid(), party_id: partyId, character_id: s.charId, slot_order: i + 1 });
    });
    showToast('파티가 생성되었습니다.');
  }

  closeModal('partyModal');
  renderParties();
}

    return;
  }
  if (!note) {
    document.getElementById('memoContentError').textContent = '메모 내용을 입력해주세요.';
    return;
  }

  const values = { player_id: playerId, note, week_label: '이번 주' };

  if (isSupabaseConnected) {
    const d = await dbInsert('weekly_player_notes', values);
    if (!d) return;
    closeModal('memoModal');
    await reloadAndRender();
    showToast('메모가 추가되었습니다.');
    return;
  }

  state.weeklyNotes.push({ id: uid(), ...values });
  closeModal('memoModal');
  renderWeeklyNotes();
  showToast('메모가 추가되었습니다.');
}

async function deleteMemo(id) {
  if (isSupabaseConnected) {
    const ok = await dbDelete('weekly_player_notes', { id });
    if (!ok) return;
    await reloadAndRender();
    showToast('메모가 삭제되었습니다.');
    return;
  }

  state.weeklyNotes = state.weeklyNotes.filter(n => n.id !== id);
  renderWeeklyNotes();
  showToast('메모가 삭제되었습니다.');
}

document.addEventListener('DOMContentLoaded', async () => {
  bindModalCloseEvents();

  const connected = initSupabase();
  if (!connected) {
    loadDemoData();
    renderAll();
    switchTab('schedule');
    showToast('데모 모드로 실행 중입니다. Supabase 연결 실패', 'info');
    return;
  }

  await loadAllData();
  renderAll();
  switchTab('schedule');
  showToast('불러오기 완료', 'success');
});
</script>
